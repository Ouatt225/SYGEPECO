{% load static %}
<!DOCTYPE html><html lang="fr"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYGEPECO — Mot de passe reinitialise</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Manrope',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#F5F4F0;}
    .card{background:#fff;border:1px solid #E5E3DE;border-radius:20px;padding:48px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center;}
    .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:36px;}
    .logo-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#C8902E 0%,#8B5E1A 100%);display:flex;align-items:center;justify-content:center;}
    .logo-icon svg{width:20px;height:20px;color:#06060F;}
    .logo-name{font-size:.9375rem;font-weight:800;color:#0E0F1E;letter-spacing:.04em;}
    .success-icon{width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;}
    .success-icon svg{width:36px;height:36px;color:#16A34A;}
    .eyebrow{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#16A34A;margin-bottom:10px;}
    .title{font-size:1.7rem;font-weight:800;color:#0E0F1E;letter-spacing:-.03em;margin-bottom:12px;}
    .subtitle{font-size:.875rem;color:#888;margin-bottom:32px;line-height:1.7;}
    .btn-login{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:linear-gradient(135deg,#C8902E 0%,#A87020 100%);color:#fff;font-family:'Manrope',sans-serif;font-size:.9375rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;box-shadow:0 6px 20px rgba(200,144,46,.3);transition:all .22s;text-decoration:none;}
    .btn-login:hover{background:linear-gradient(135deg,#E8B450 0%,#C8902E 100%);transform:translateY(-1px);color:#fff;}
  </style></head><body>
<div class="card">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><div class="logo-name">SYGEPECO</div></div>
  <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <div class="eyebrow">Succes</div>
  <h1 class="title">Mot de passe<br>reinitialise !</h1>
  <p class="subtitle">Votre nouveau mot de passe a ete enregistre. Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.</p>
  <a href="{% url 'login' %}" class="btn-login"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Se connecter</a>
</div></body></html>
